name: dbt CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: dbt_project

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Decode GCP keyfile
        run: |
          echo "${{ secrets.DBT_BIGQUERY_KEYFILE }}" | base64 -d > /tmp/gcp_keyfile.json

      - name: Write profiles.yml
        run: |
          printf 'dtc_brand_analytics:\n  target: ci\n  outputs:\n    ci:\n      type: bigquery\n      method: service-account\n      project: analytics-eng-project\n      dataset: dtc_analytics_ci\n      keyfile: /tmp/gcp_keyfile.json\n      threads: 4\n      timeout_seconds: 300\n      location: US\n' > dbt_project/profiles.yml

      - name: Install dbt packages
        run: dbt deps --project-dir dbt_project

      - name: dbt build
        run: dbt build --project-dir dbt_project
