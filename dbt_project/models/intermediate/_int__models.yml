version: 2

models:
  - name: int_facebook_ads__daily_unified
    description: >
      Union of daily campaign-level (2020) and daily account-level (2019) Facebook ad data
      with a consistent schema. Account rows have campaign_name = 'account_level_aggregate'.
    columns:
      - name: report_date_start
        description: Start date of the reporting period
        tests:
          - not_null
      - name: source_granularity
        description: Whether the row is from campaign-level or account-level data
        tests:
          - accepted_values:
              arguments:
                values: ['campaign', 'account']

  - name: int_orders__enriched
    description: >
      Shopify orders joined with aggregated order item details including product family
      breakdown, actual line item counts, and total line item revenue.
    columns:
      - name: order_id
        description: Unique Shopify order identifier
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: int_customer__spine
    description: >
      One row per customer with lifetime metrics: first/last order dates, total orders,
      total revenue, AOV, repeat purchase flag, and lifetime days.
    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: total_orders
        tests:
          - not_null
      - name: is_repeat_customer
        tests:
          - not_null

  - name: int_daily_revenue
    description: >
      Daily Shopify revenue aggregation: order count, revenue, quantity, and AOV.
    columns:
      - name: order_date
        description: Date of orders
        tests:
          - unique
          - not_null

  - name: int_monthly_revenue
    description: >
      Monthly Shopify revenue aggregation: order count, revenue, quantity, and AOV.
    columns:
      - name: order_month
        description: First day of the month
        tests:
          - unique
          - not_null

  - name: int_monthly_ad_performance
    description: >
      Unified monthly ad metrics across Facebook, Google Search, and Google Shopping.
      Consistent schema: platform, month, cost, impressions, conversions, conversion_value.
    columns:
      - name: platform
        description: Ad platform identifier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['facebook', 'google_ads_search', 'google_ads_shopping']
      - name: report_month
        tests:
          - not_null
